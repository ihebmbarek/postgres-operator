name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-validate:
    name: Test and validate operator
    runs-on: ubuntu-latest

    env:
      ENVTEST_K8S_VERSION: "1.32.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Display Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Install controller-gen
        run: |
          GOBIN=$PWD/bin go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Install envtest binaries
        run: |
          GOBIN=$PWD/bin go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "$PWD/bin" >> "$GITHUB_PATH"
          echo "KUBEBUILDER_ASSETS=$($PWD/bin/setup-envtest use ${ENVTEST_K8S_VERSION} -p path)" >> "$GITHUB_ENV"

      - name: Show envtest assets
        run: |
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS"
          ls -lah "$KUBEBUILDER_ASSETS"

      - name: Run unit tests
        run: go test ./api/... ./cmd/... ./internal/controller/...

      - name: Generate manifests
        run: make manifests

      - name: Check generated files are committed
        run: git diff --exit-code
