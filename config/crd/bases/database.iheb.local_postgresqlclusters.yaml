---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: postgresqlclusters.database.iheb.local
spec:
  group: database.iheb.local
  names:
    kind: PostgreSQLCluster
    listKind: PostgreSQLClusterList
    plural: postgresqlclusters
    singular: postgresqlcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.postgresPod
      name: Postgres Pod
      type: string
    - jsonPath: .status.backupEnabled
      name: Backup
      type: boolean
    - jsonPath: .status.restorePhase
      name: Restore
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: PostgreSQLCluster is the Schema for the postgresqlclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PostgreSQLClusterSpec defines the desired state of PostgreSQLCluster.
            properties:
              backup:
                description: Backup defines the optional Barman backup configuration.
                properties:
                  archiveTimeout:
                    description: ArchiveTimeout defines how often PostgreSQL should
                      force WAL segment switching, in seconds.
                    format: int32
                    type: integer
                  backupImage:
                    description: BackupImage optionally overrides the image used by
                      the backup CronJob.
                    type: string
                  barmanHost:
                    description: BarmanHost is the IP address or hostname of the external
                      Barman backup server.
                    type: string
                  barmanServerName:
                    description: BarmanServerName is the server name configured on
                      the Barman backup machine.
                    type: string
                  barmanUser:
                    description: BarmanUser is the SSH user used to connect to the
                      Barman server.
                    type: string
                  enabled:
                    description: Enabled indicates whether Barman backup integration
                      is enabled.
                    type: boolean
                  exposeService:
                    description: |-
                      ExposeService indicates whether the operator should create
                      an external NodePort Service for the Barman server.
                    type: boolean
                  nodePort:
                    description: |-
                      NodePort is the external port exposed on each OpenShift node
                      for Barman database and streaming connections.
                    format: int32
                    maximum: 32767
                    minimum: 30000
                    type: integer
                  replicationAllowedCIDR:
                    description: |-
                      ReplicationAllowedCIDR restricts physical replication access to the
                      trusted Barman server network. Example: "192.168.180.54/32".
                    type: string
                  schedule:
                    description: |-
                      Schedule defines when the operator-managed backup CronJob runs.
                      Example: "0 2 * * *".
                    type: string
                  sshSecretName:
                    description: SSHSecretName is the Kubernetes Secret containing
                      the SSH private key for Barman access.
                    type: string
                  streamingUser:
                    description: |-
                      StreamingUser is the PostgreSQL role used by Barman for pg_basebackup
                      and pg_receivewal. When empty, the operator defaults to "streaming_barman".
                    type: string
                  suspendScheduledBackups:
                    description: SuspendScheduledBackups pauses the CronJob without
                      deleting it.
                    type: boolean
                type: object
              cpuLimit:
                type: string
              cpuRequest:
                type: string
              database:
                type: string
              image:
                type: string
              memoryLimit:
                type: string
              memoryRequest:
                type: string
              postgresVersion:
                type: string
              restore:
                description: |-
                  Restore defines an optional Barman PITR request.
                  Restore must remain disabled during normal operation.
                properties:
                  backupId:
                    description: |-
                      BackupID identifies the Barman base backup used as the restore starting point.
                      Example: "20260611T203128".
                      When empty, the controller may use the latest available backup.
                    type: string
                  enabled:
                    description: |-
                      Enabled indicates whether the operator should perform a restore operation.
                      Keep this value false during normal PostgreSQL operation.
                    type: boolean
                  preserveExistingData:
                    description: |-
                      PreserveExistingData indicates whether the current PGDATA directory
                      should be preserved before restoring the selected Barman backup.
                    type: boolean
                  restoreImage:
                    description: |-
                      RestoreImage optionally overrides the image used by the restore Job.
                      When empty, the operator uses the configured PostgreSQL image.
                    type: string
                  targetAction:
                    description: |-
                      TargetAction defines the action PostgreSQL performs after reaching
                      the requested recovery target.
                    enum:
                    - promote
                    - pause
                    - shutdown
                    type: string
                  targetTime:
                    description: |-
                      TargetTime is the desired PITR recovery timestamp.
                      PostgreSQL replays archived WAL records until this timestamp is reached.
                      Example: "2026-06-11T16:31:35Z".
                    format: date-time
                    type: string
                type: object
              storageClassName:
                type: string
              storageSize:
                type: string
              user:
                type: string
            type: object
          status:
            description: PostgreSQLClusterStatus defines the observed state of PostgreSQLCluster.
            properties:
              backupCronJob:
                description: BackupCronJob is the generated CronJob responsible for
                  scheduled backups.
                type: string
              backupEnabled:
                description: BackupEnabled indicates whether backup configuration
                  is enabled.
                type: boolean
              backupPhase:
                description: BackupPhase describes the current backup configuration
                  state.
                type: string
              backupSchedule:
                description: BackupSchedule is the active CronJob schedule.
                type: string
              barmanNodePort:
                format: int32
                type: integer
              barmanService:
                type: string
              lastBackupId:
                type: string
              lastBackupStatus:
                type: string
              lastBackupTime:
                format: date-time
                type: string
              lastRestoreTime:
                description: LastRestoreTime records when the most recent successful
                  restore completed.
                format: date-time
                type: string
              phase:
                type: string
              postgresPod:
                type: string
              ready:
                type: boolean
              restoreBackupId:
                description: RestoreBackupID is the Barman base backup selected for
                  the restore.
                type: string
              restoreEnabled:
                description: RestoreEnabled indicates whether a restore request is
                  active.
                type: boolean
              restoreJob:
                description: |-
                  RestoreJob is the name of the generated Kubernetes Job responsible
                  for executing the PITR restore workflow.
                type: string
              restoreMessage:
                description: |-
                  RestoreMessage provides a human-readable description of the latest
                  restore workflow event or failure.
                type: string
              restorePhase:
                description: |-
                  RestorePhase describes the current PITR workflow state.
                  Example values: Disabled, Pending, Preparing, Restoring, Completed, Failed.
                type: string
              restoreTargetTime:
                description: RestoreTargetTime is the requested PostgreSQL PITR timestamp.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
