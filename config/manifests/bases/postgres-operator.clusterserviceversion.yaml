apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
  name: postgres-operator.v0.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: PostgreSQLBackup is the Schema for the postgresqlbackups API
      displayName: Postgre SQLBackup
      kind: PostgreSQLBackup
      name: postgresqlbackups.database.iheb.local
      version: v1
    - description: PostgreSQLCluster is the Schema for the postgresqlclusters API.
      displayName: Postgre SQLCluster
      kind: PostgreSQLCluster
      name: postgresqlclusters.database.iheb.local
      version: v1
    - description: PostgreSQLRestore is the Schema for the postgresqlrestores API
      displayName: Postgre SQLRestore
      kind: PostgreSQLRestore
      name: postgresqlrestores.database.iheb.local
      version: v1
  description: PG Guardian is a PostgreSQL Operator for OpenShift that automates PostgreSQL
    deployment, persistent storage, Barman backup integration, scheduled backups,
    Point-in-Time Recovery, PgBouncer connection pooling, and OpenShift monitoring
    and alerting.
  displayName: PG Guardian operator
  icon:
  - base64data: ""
    mediatype: ""
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - postgresql
  - operator
  - openshift
  - kubernetes
  - database
  - backup
  - recovery
  - pitr
  - barman
  - pgbouncer
  - monitoring
  - prometheus
  links:
  - name: Postgres Operator
    url: https://postgres-operator.domain
  maturity: alpha
  provider:
    name: Iheb Mbarek
    url: https://github.com/ihebmbarek/postgres-operator
  version: 0.0.0
