apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../default
  - ../../monitoring

patches:
  - path: operator-metrics-service-patch.yaml
    target:
      version: v1
      kind: Service
      name: postgres-operator-controller-manager-metrics-service

  - path: operator-metrics-tls-deployment-patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: postgres-operator-controller-manager
