apiVersion: batch/v1
kind: CronJob
metadata:
  creationTimestamp: "2026-06-09T16:47:15Z"
  generation: 12
  labels:
    app: sample-postgres
    app.kubernetes.io/component: backup
    managed: postgres-operator
  name: sample-postgres-barman-backup
  namespace: alpha
  ownerReferences:
  - apiVersion: database.iheb.local/v1
    blockOwnerDeletion: true
    controller: true
    kind: PostgreSQLCluster
    name: sample-postgres
    uid: 7b0a0db1-90d3-48c3-b485-5f558e2aa7b1
  resourceVersion: "36399726"
  uid: 77374c33-fa31-4af6-a662-2d7fa39090e7
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata: {}
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: sample-postgres
            app.kubernetes.io/component: backup
            managed: postgres-operator
        spec:
          containers:
          - args:
            - |
              set -euo pipefail

              echo "Starting scheduled Barman backup for 'sample-postgres'"

              for attempt in 1 2 3; do
                echo "Backup attempt ${attempt}/3"

                if ssh \
                  -i /etc/barman-ssh/id_ed25519 \
                  -l 'barman' \
                  -o UserKnownHostsFile=/etc/barman-ssh/known_hosts \
                  -o StrictHostKeyChecking=yes \
                  -o IdentitiesOnly=yes \
                  -o PreferredAuthentications=publickey \
                  -o PasswordAuthentication=no \
                  -o BatchMode=yes \
                  '192.168.180.54' \
                  "barman backup 'sample-postgres' --wait"
                then
                  echo "Scheduled Barman backup completed successfully"
                  exit 0
                fi

                if [ "${attempt}" -lt 3 ]; then
                  delay=$((attempt * 20))
                  echo "Backup attempt failed; retrying in ${delay}s"
                  sleep "${delay}"
                fi
              done

              echo "Scheduled Barman backup failed after 3 attempts" >&2
              exit 1
            command:
            - /bin/bash
            - -lc
            image: quay.io/iheb_mbarek/postgres-barman:latest
            imagePullPolicy: Always
            name: barman-backup
            resources:
              limits:
                cpu: 250m
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 64Mi
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            volumeMounts:
            - mountPath: /etc/barman-ssh
              name: barman-ssh
              readOnly: true
          dnsPolicy: ClusterFirst
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          terminationGracePeriodSeconds: 30
          volumes:
          - name: barman-ssh
            projected:
              defaultMode: 256
              sources:
              - secret:
                  items:
                  - key: id_ed25519
                    path: id_ed25519
                  name: barman-ssh-key
              - configMap:
                  items:
                  - key: known_hosts
                    path: known_hosts
                  name: barman-known-hosts
  schedule: 0 2 * * *
  successfulJobsHistoryLimit: 3
  suspend: false
status:
  lastScheduleTime: "2026-06-14T02:00:00Z"
  lastSuccessfulTime: "2026-06-14T14:56:29Z"
