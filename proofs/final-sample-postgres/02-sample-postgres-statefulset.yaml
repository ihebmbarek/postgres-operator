apiVersion: apps/v1
kind: StatefulSet
metadata:
  creationTimestamp: "2026-06-01T18:15:57Z"
  generation: 24
  labels:
    app: sample-postgres
    managed: postgres-operator
  name: sample-postgres
  namespace: alpha
  ownerReferences:
  - apiVersion: database.iheb.local/v1
    blockOwnerDeletion: true
    controller: true
    kind: PostgreSQLCluster
    name: sample-postgres
    uid: 7b0a0db1-90d3-48c3-b485-5f558e2aa7b1
  resourceVersion: "54875617"
  uid: db7dd42b-ad1c-4272-9dd7-edcaf4c39bb4
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: sample-postgres
      managed: postgres-operator
  serviceName: sample-postgres
  template:
    metadata:
      annotations:
        database.iheb.local/config-hash: 9bff2b69fdc338979814490501d060d29e47ccf94c53cb3263eaa8a314715bd7
        database.iheb.local/template-hash: E1JR9KiYQqc9uuOBspNl7MuUZcloScX4zrzWI9H-PD0
      labels:
        app: sample-postgres
        app.kubernetes.io/component: postgres
        managed: postgres-operator
    spec:
      containers:
      - args:
        - -c
        - config_file=/etc/postgresql/custom.conf
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DB
              name: sample-postgres-credentials
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: sample-postgres-credentials
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: sample-postgres-credentials
        - name: STREAMING_USER
          valueFrom:
            secretKeyRef:
              key: STREAMING_USER
              name: sample-postgres-streaming-credentials
              optional: true
        - name: STREAMING_PASSWORD
          valueFrom:
            secretKeyRef:
              key: STREAMING_PASSWORD
              name: sample-postgres-streaming-credentials
              optional: true
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: quay.io/iheb_mbarek/postgres-barman:latest
        imagePullPolicy: Always
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -ec
              - |2

                attempt=1

                while [ "${attempt}" -le 60 ]; do
                  if pg_isready \
                    -h 127.0.0.1 \
                    -p 5432 \
                    -U "${POSTGRES_USER}" \
                    -d postgres \
                    >/dev/null 2>&1
                  then
                    if psql \
                      -v ON_ERROR_STOP=1 \
                      -U "${POSTGRES_USER}" \
                      -d postgres \
                      --set=streaming_user="${STREAMING_USER}" \
                      --set=streaming_password="${STREAMING_PASSWORD}" \
                      <<'SQL'
                SELECT format(
                  'CREATE ROLE %I WITH LOGIN REPLICATION PASSWORD %L',
                  :'streaming_user',
                  :'streaming_password'
                )
                WHERE NOT EXISTS (
                  SELECT 1
                  FROM pg_roles
                  WHERE rolname = :'streaming_user'
                )
                \gexec

                SELECT format(
                  'ALTER ROLE %I WITH LOGIN REPLICATION PASSWORD %L',
                  :'streaming_user',
                  :'streaming_password'
                )
                \gexec
                SQL
                    then
                      echo "Streaming replication role configured successfully"

                      RECOVERY_STATE="$(
                        psql \
                          -U "${POSTGRES_USER}" \
                          -d postgres \
                          -Atqc "SELECT pg_is_in_recovery();"
                      )"

                      if [ "${RECOVERY_STATE}" = "f" ]; then
                        psql \
                          -v ON_ERROR_STOP=1 \
                          -U "${POSTGRES_USER}" \
                          -d postgres \
                          -c "ALTER SYSTEM RESET restore_command;" \
                          || true

                        psql \
                          -v ON_ERROR_STOP=1 \
                          -U "${POSTGRES_USER}" \
                          -d postgres \
                          -c "ALTER SYSTEM RESET recovery_target_time;" \
                          || true

                        psql \
                          -v ON_ERROR_STOP=1 \
                          -U "${POSTGRES_USER}" \
                          -d postgres \
                          -c "ALTER SYSTEM RESET recovery_target_action;" \
                          || true

                        psql \
                          -v ON_ERROR_STOP=1 \
                          -U "${POSTGRES_USER}" \
                          -d postgres \
                          -c "SELECT pg_reload_conf();" \
                          || true

                        rm -rf \
                          /var/lib/postgresql/data/barman-wal-* \
                          || true

                        echo "Post-PITR PostgreSQL cleanup completed successfully"
                      fi

                      exit 0
                    fi
                  fi

                  attempt=$((attempt + 1))
                  sleep 2
                done

                echo "Failed to configure the streaming replication role" >&2
                exit 1
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - appuser
            - -d
            - appdb
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 5
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - appuser
            - -d
            - appdb
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-storage
        - mountPath: /etc/postgresql/custom.conf
          name: postgres-config
          readOnly: true
          subPath: custom.conf
        - mountPath: /etc/postgresql/pg_hba.conf
          name: postgres-config
          readOnly: true
          subPath: pg_hba.conf
        - mountPath: /etc/postgresql/tls
          name: postgres-tls-runtime
          readOnly: true
        - mountPath: /etc/barman-ssh
          name: barman-ssh-runtime
          readOnly: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
      - args:
        - |
          cp /var/run/postgres-tls-source/tls.crt /etc/postgresql/tls/server.crt
          cp /var/run/postgres-tls-source/tls.key /etc/postgresql/tls/server.key
          if [ -f /var/run/postgres-tls-source/ca.crt ]; then cp /var/run/postgres-tls-source/ca.crt /etc/postgresql/tls/ca.crt; else cp /var/run/postgres-tls-source/tls.crt /etc/postgresql/tls/ca.crt; fi
          chmod 644 /etc/postgresql/tls/server.crt
          chmod 600 /etc/postgresql/tls/server.key
          chmod 644 /etc/postgresql/tls/ca.crt
        command:
        - /bin/sh
        - -ec
        image: quay.io/iheb_mbarek/postgres-barman:latest
        imagePullPolicy: Always
        name: prepare-postgres-tls
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/run/postgres-tls-source
          name: postgres-tls-secret
          readOnly: true
        - mountPath: /etc/postgresql/tls
          name: postgres-tls-runtime
      - args:
        - |2

          cp /var/run/barman-secret/id_ed25519 /etc/barman-ssh/id_ed25519
          cp /var/run/barman-known-hosts/known_hosts /etc/barman-ssh/known_hosts
          chmod 600 /etc/barman-ssh/id_ed25519
          chmod 644 /etc/barman-ssh/known_hosts

          cat > /etc/barman-ssh/ssh <<'EOF'
          #!/bin/sh
          exec /usr/bin/ssh \
            -i /etc/barman-ssh/id_ed25519 \
            -o UserKnownHostsFile=/etc/barman-ssh/known_hosts \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            -o PreferredAuthentications=publickey \
            -o PasswordAuthentication=no \
            -o BatchMode=yes \
            "$@"
          EOF

          chmod 755 /etc/barman-ssh/ssh
        command:
        - /bin/sh
        - -ec
        image: quay.io/iheb_mbarek/postgres-barman:latest
        imagePullPolicy: Always
        name: prepare-barman-ssh
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/run/barman-secret
          name: barman-ssh-secret
          readOnly: true
        - mountPath: /var/run/barman-known-hosts
          name: barman-known-hosts
          readOnly: true
        - mountPath: /etc/barman-ssh
          name: barman-ssh-runtime
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: sample-postgres-config
        name: postgres-config
      - name: postgres-tls-secret
        secret:
          defaultMode: 288
          secretName: sample-postgres-tls
      - emptyDir: {}
        name: postgres-tls-runtime
      - name: barman-ssh-secret
        secret:
          defaultMode: 288
          secretName: barman-ssh-key
      - configMap:
          defaultMode: 420
          name: barman-known-hosts
        name: barman-known-hosts
      - emptyDir: {}
        name: barman-ssh-runtime
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: postgres-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: nfs-client
      volumeMode: Filesystem
    status:
      phase: Pending
