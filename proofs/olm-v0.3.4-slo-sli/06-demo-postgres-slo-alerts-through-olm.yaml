apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations:
    pg-guardian.io/slo-description: Operator-generated SLO/SLI Prometheus alerts for
      PostgreSQL workload reliability.
  creationTimestamp: "2026-06-26T15:32:55Z"
  generation: 1
  labels:
    app: demo-postgres
    app.kubernetes.io/component: slo-alerts
    app.kubernetes.io/managed-by: postgres-operator
    app.kubernetes.io/name: demo-postgres
    pg-guardian.io/sre: slo-sli
  name: demo-postgres-slo-alerts
  namespace: alpha
  ownerReferences:
  - apiVersion: database.iheb.local/v1
    blockOwnerDeletion: true
    controller: true
    kind: PostgreSQLCluster
    name: demo-postgres
    uid: f2e40fc3-8d99-4551-a3bc-85e6422d5ee0
  resourceVersion: "54761513"
  uid: 69528587-8bcd-4c31-821e-a40139f91542
spec:
  groups:
  - name: pg-guardian.demo-postgres.slo.rules
    rules:
    - alert: PGGuardianPostgresAvailabilitySLOBreach_DEMO_POSTGRES
      annotations:
        description: PostgreSQL availability for cluster demo-postgres is below the
          99.9% SLO over the last 5 minutes.
        summary: PostgreSQL availability SLO breach
      expr: avg_over_time(pg_up{namespace="alpha",service="demo-postgres-exporter"}[5m])
        < 0.999
      for: 2m
      labels:
        component: database
        namespace: alpha
        severity: critical
        sli: postgres_availability
        slo: 99.9_percent_availability
        slo_target: "99.9"
    - alert: PGGuardianBackupFreshnessSLOBreach_DEMO_POSTGRES
      annotations:
        description: No successful Barman backup for PostgreSQL cluster demo-postgres
          has been observed within the last 24 hours.
        summary: Backup freshness SLO breach
      expr: (time() - kube_cronjob_status_last_successful_time{namespace="alpha",cronjob="demo-postgres-barman-backup"})
        > 86400
      for: 5m
      labels:
        component: backup
        namespace: alpha
        severity: warning
        sli: backup_freshness
        slo: successful_backup_within_24h
        slo_target: 24h
    - alert: PGGuardianBackupJobFailed_DEMO_POSTGRES
      annotations:
        description: At least one Barman backup job for PostgreSQL cluster demo-postgres
          failed.
        summary: Backup job failed
      expr: kube_job_status_failed{namespace="alpha",job_name=~"demo-postgres-barman-backup-.*"}
        > 0
      for: 1m
      labels:
        component: backup
        namespace: alpha
        severity: warning
        sli: backup_success
        slo: backup_jobs_must_succeed
    - alert: PGGuardianPgBouncerAvailabilitySLOBreach_DEMO_POSTGRES
      annotations:
        description: PgBouncer for PostgreSQL cluster demo-postgres has no available
          replicas.
        summary: PgBouncer availability SLO breach
      expr: kube_deployment_status_replicas_available{namespace="alpha",deployment="demo-postgres-pgbouncer"}
        < 1
      for: 2m
      labels:
        component: pgbouncer
        namespace: alpha
        severity: warning
        sli: pgbouncer_availability
        slo: pooler_must_be_available
        slo_target: at_least_1_available_replica
